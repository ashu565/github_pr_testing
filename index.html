<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PR Agent Test Target</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<h1>PR Agent Test Target</h1>

<section id="login-section">
  <h2>Login</h2>
  <div class="row">
    <input id="email" placeholder="email" />
    <input id="password" type="password" placeholder="password" />
    <button id="login-btn">Login</button>
  </div>
  <div id="login-msg" class="msg"></div>
</section>

<section id="counter-section">
  <h2>Counter</h2>
  <div class="row">
    <button id="decrement-btn">-</button>
    <span id="counter-value" data-testid="counter-value">0</span>
    <button id="increment-btn">+</button>
    <button id="reset-btn">Reset</button>
  </div>
</section>

<section id="todo-section">
  <h2>Todo</h2>
  <div class="row">
    <input id="todo-input" placeholder="Add a task" />
    <button id="add-todo-btn">Add</button>
  </div>
  <ul id="todo-list" data-testid="todo-list"></ul>
  <div id="todo-msg" class="msg"></div>
</section>

<script src="login.js"></script>
<script src="counter.js"></script>
<script src="todo.js"></script>
</body>
</html>
